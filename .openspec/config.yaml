version: 1
project: qoder-java-review-governance
catalog_root: rules/catalog
schema_path: rules/review-rule-schema.yaml
change_root: .openspec/changes
templates:
  rule_proposal: .openspec/templates/rule-proposal.md
  rule_admission_review: .openspec/templates/rule-admission-review.md
  rule_deprecation: .openspec/templates/rule-deprecation.md
policies:
  - .openspec/policies/rule-admission-policy.md
workflow:
  require_proposal: true
  require_admission_review: true
  require_conflict_check: true
  require_catalog_validation: true
  allow_direct_activation_without_review: false
