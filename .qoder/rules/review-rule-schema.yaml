$schema: https://json-schema.org/draft/2020-12/schema
title: Qoder Java Review Rule
description: 面向项目级 Java / Spring / SOFA review rules 的 metadata contract。
type: object
required:
  - schema_version
  - id
  - title
  - summary
  - owner
  - status
  - category
  - severity
  - profile_tags
  - applies_to
  - review
  - prompt_hints
  - governance
properties:
  schema_version:
    type: string
    enum: [v1]
  id:
    type: string
    pattern: ^[A-Z]{2}-[A-Z0-9-]+$
  title:
    type: string
    minLength: 8
  summary:
    type: string
    minLength: 16
  owner:
    type: string
    minLength: 3
  status:
    type: string
    enum: [draft, active, deprecated, rejected]
  category:
    type: string
    enum: [semantic-review, deterministic-candidate, governance-only]
  severity:
    type: string
    enum: [info, minor, major, critical]
  profile_tags:
    type: array
    items:
      type: string
  applies_to:
    type: object
    required: [languages, frameworks, paths]
    properties:
      languages:
        type: array
        items:
          type: string
      frameworks:
        type: array
        items:
          type: string
      module_patterns:
        type: array
        items:
          type: string
      paths:
        type: array
        items:
          type: string
      package_patterns:
        type: array
        items:
          type: string
  review:
    type: object
    required: [objective, checklist, positive_indicators, anti_patterns, comment_contract]
    properties:
      objective:
        type: string
      checklist:
        type: array
        items:
          type: string
      positive_indicators:
        type: array
        items:
          type: string
      anti_patterns:
        type: array
        items:
          type: string
      comment_contract:
        type: string
  prompt_hints:
    type: object
    required: [load_by_default, load_when]
    properties:
      load_by_default:
        type: boolean
      load_when:
        type: object
        properties:
          scopes:
            type: array
            items:
              type: string
          objectives:
            type: array
            items:
              type: string
      max_context_lines:
        type: integer
        minimum: 0
      prefer_when_profiles:
        type: array
        items:
          type: string
  deterministic:
    type: object
    properties:
      target_engine:
        type: string
        enum: [archunit, checkstyle, pmd, spotbugs, custom-script]
      migration_readiness:
        type: string
        enum: [candidate, ready, blocked]
      suggested_artifact:
        type: string
      detection_strategy:
        type: string
  governance:
    type: object
    required:
      - admission_decision
      - rationale
      - evidence_required
      - conflicts_with
      - supersedes
      - related_rules
    properties:
      admission_decision:
        type: string
        enum:
          - keep-in-semantic-review
          - migrate-to-deterministic
          - reject-from-semantic-review
      rationale:
        type: string
      evidence_required:
        type: array
        items:
          type: string
      conflicts_with:
        type: array
        items:
          type: string
      supersedes:
        type: array
        items:
          type: string
      related_rules:
        type: array
        items:
          type: string
additionalProperties: true
